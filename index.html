<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggie Cart</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://kit.fontawesome.com/63dd77a3e8.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@200..700&display=swap" rel="stylesheet">
</head>
<body class="stack-sans-text-font">
    <header id="header">
        <div class="container">
            <div class="logo">
                <h1>Veggie_cart</h1>
            </div>
            <nav id="navMenu" class="navMenu">
                <ul class="navList">
                    <li><a href="#" class="navLink active">Home</a></li>
                    <li><a href="#" class="navLink">Menu</a></li>
                    <li><a href="#" class="navLink">About</a></li>
                    <li><a href="#" class="navLink">Contact</a></li>
                </ul>
            </nav>
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h2>Deliciosos Platillos Veganos</h2>
                    <p>Descubre nuestra selección de comida vegana saludable y deliciosa</p>
                    <button class="btn-primary" onclick="scrollToProducts()">Ver Productos</button>
                </div>
            </div>
        </section>
</body>
</html>
